# =============================================================
# railway/backend.railway.toml
# LiveDemo Backend API — internal only, no public domain
# =============================================================

[build]
  dockerImage = "docker.io/livedemo/livedemo-backend:latest"

[deploy]
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[deploy.healthcheck]
  path = "/health"
  timeout = 30
