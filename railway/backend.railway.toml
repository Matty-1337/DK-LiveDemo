# =============================================================
# railway/backend.railway.toml
# LiveDemo Backend API — internal only, no public domain
# =============================================================

[build]
  # Patched image: S3 bucket livedemo-cdn → dk-livedemo-cdn + env-dump stripped (see backend-patch/)
  dockerImage = "ghcr.io/matty-1337/dk-livedemo-backend:v4"

[deploy]
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[deploy.healthcheck]
  path = "/health"
  timeout = 30
