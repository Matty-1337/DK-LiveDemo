# livedemo-browser — set Railway **Root Directory** to `browser` for this service.
# If Root Directory is repo root, Railway uses the top-level railway.toml (proxy)
# and the build fails with "/Caddyfile": not found.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerContext = "."

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
